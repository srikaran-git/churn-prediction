project :
  name : "Churn-prediction"
  version : "1.0.0 "
  author : "Karan"
  description : "ML system to predict customer churn"

data :
  raw_path : "data/raw/churn.csv"
  processed_path : "data/processed/churn_processed.csv"
  test_size : 0.2
  random_state : 42

model :
  name : "RandomForestClassifier" 
  parameters :
    n_estimators : 100
    max_depth : 10
    random_state : 42
  save_path : "models/model_v1.pkl"

api :
  host : "0.0.0.0"
  port : 8000
  debug : false

logging :
  level : "INFO"
  log_file : "logs/app.log"