project:
  name: "churn-prediction"
  version: "1.0.0"
  author: "Karan"
  description: "ML system to predict customer churn"

data:
  raw_path: "data/raw/churn.csv"
  processed_path: "data/processed/churn_processed.csv"
  test_size: 0.2
  random_state: 42
  target_column: "churn"

model:
  save_path: "models/model_v1.pkl"
  parameters:
    n_estimators: 100
    max_depth: 5
  prediction_threshold: 0.5

logging:
  level: "INFO"
  log_file: "logs/app.log"
