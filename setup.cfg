[flake8]
max-line-length = 88
exclude =
    venv,
    .git,
    __pycache__,
    notebooks,
    .pytest_cache,
    site-packages,
    ipynb_checkpoints,
    node_modules,
    Include,
    Lib
    

ignore =
    E203,
    W503

[isort]
profile = black
multi_line_output = 3

[tool:pytest]
testpaths = tests
addopts = -v